  [data-theme="light"]{
    --bg-0:#eef4ff;
    --bg-1:#ffffff;
    --glass:rgba(255,255,255,0.72);
    --glass-strong:rgba(255,255,255,0.92);
    --glass-border:rgba(30,64,175,0.14);
    --ink:#0f2044;
    --ink-dim:#4c5c7d;
    --ink-faint:#8494b3;
    --cyan:#2563eb;
    --violet:#1d4ed8;
    --pink:#3b82f6;
    --amber:#d97706;
    --green:#059669;
    --red:#dc2626;
  }
  [data-theme="light"] body{
    background:
      radial-gradient(900px 600px at 8% -8%, rgba(37,99,235,0.10), transparent 60%),
      radial-gradient(1000px 700px at 105% 8%, rgba(29,78,216,0.10), transparent 55%),
      radial-gradient(800px 600px at 50% 115%, rgba(59,130,246,0.08), transparent 55%),
      linear-gradient(180deg, var(--bg-0), var(--bg-1));
  }
  [data-theme="light"] .glass{ box-shadow:0 8px 28px rgba(30,64,175,0.10), inset 0 1px 0 rgba(255,255,255,0.6); }
  [data-theme="light"] .bg-orb{ opacity:0.28; }
  [data-theme="light"] #bg3d{ opacity:0.35; }
  [data-theme="light"] .floaty, [data-theme="light"] .float-item{ opacity:0.06 !important; }
  [data-theme="light"] .hero h1{ background:linear-gradient(120deg,#0f2044, #2563eb 55%, #1d4ed8); -webkit-background-clip:text; background-clip:text; }
  [data-theme="light"] .brand-mark{ box-shadow:0 0 20px rgba(37,99,235,0.35); }
  [data-theme="light"] ::-webkit-scrollbar-thumb{ background:rgba(30,64,175,0.18); }
  [data-theme="light"] .btn-primary{ color:#fff; }

  /* ---------- Boot loading screen ---------- */
  .boot-loader{
    position:fixed; inset:0; z-index:9999;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:
      radial-gradient(900px 600px at 8% -8%, rgba(45,212,240,0.16), transparent 60%),
      radial-gradient(1000px 700px at 105% 8%, rgba(166,121,255,0.17), transparent 55%),
      linear-gradient(180deg, var(--bg-0), var(--bg-1));
    transition:opacity .6s ease, visibility .6s ease;
  }
  .boot-loader.hide{ opacity:0; visibility:hidden; pointer-events:none; }
  .boot-logo{
    width:78px; height:78px; border-radius:22px; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg, var(--cyan), var(--violet));
    box-shadow:0 0 40px rgba(166,121,255,0.5);
    margin-bottom:22px;
    animation:bootPulse 2.2s ease-in-out infinite;
  }
  @keyframes bootPulse{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.06); } }
  .boot-title{
    font-family:'Space Grotesk', sans-serif; font-weight:800; font-size:clamp(28px,6vw,42px);
    letter-spacing:0.02em; margin-bottom:8px;
    background:linear-gradient(120deg,#fff, #c9d3ff 45%, var(--cyan));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .boot-sub{
    font-family:'Inter', sans-serif; font-size:12.5px; font-weight:600; color:var(--ink-dim);
    letter-spacing:0.14em; text-transform:uppercase;
  }
  .boot-spinner{
    margin-top:30px; width:28px; height:28px; border-radius:50%;
    border:3px solid rgba(255,255,255,0.15); border-top-color:var(--cyan);
    animation:spin 0.8s linear infinite;
  }
  @media (prefers-reduced-motion: reduce){ .boot-logo{ animation:none; } }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(900px 600px at 8% -8%, rgba(45,212,240,0.16), transparent 60%),
      radial-gradient(1000px 700px at 105% 8%, rgba(166,121,255,0.17), transparent 55%),
      radial-gradient(800px 600px at 50% 115%, rgba(255,111,165,0.13), transparent 55%),
      linear-gradient(180deg, var(--bg-0), var(--bg-1));
    background-attachment: fixed;
    min-height:100vh;
    font-family:'Inter', sans-serif;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  ::selection{ background:rgba(166,121,255,0.35); }
  #bg3d{ position:fixed; inset:0; z-index:0; pointer-events:none; display:block; width:100%; height:100%; }
  .parallax-layer{ position:fixed; inset:0; z-index:0; pointer-events:none; will-change:transform; }
  .bg-orb{
    position:absolute; border-radius:50%; filter:blur(70px); opacity:0.5; pointer-events:none;
    animation: drift 22s ease-in-out infinite alternate;
  }
  .orb1{ width:420px;height:420px; background:radial-gradient(circle, var(--cyan), transparent 70%); top:-120px; left:-100px; }
  .orb2{ width:480px;height:480px; background:radial-gradient(circle, var(--violet), transparent 70%); top:20%; right:-160px; animation-delay:-8s;}
  .orb3{ width:380px;height:380px; background:radial-gradient(circle, var(--pink), transparent 70%); bottom:-140px; left:30%; animation-delay:-15s;}
  @keyframes drift{ from{ transform:translate(0,0) scale(1);} to{ transform:translate(30px,40px) scale(1.08);} }
  @media (prefers-reduced-motion: reduce){ .bg-orb{animation:none;} }

  /* ---------- Floating background words / logo / mini-lights ---------- */
  .float-layer{ position:fixed; inset:0; z-index:2; pointer-events:none; overflow:hidden; }
  /* Large, very faint creator-logo watermark sitting in the page background, behind
     every view. Purely decorative — never replaces the app's own brand mark/logo. */
  .brand-watermark-bg{
    position:fixed; right:-60px; bottom:-60px; width:440px; height:440px; z-index:0;
    background-image:var(--brand-mark); background-size:contain; background-repeat:no-repeat; background-position:center;
    opacity:0.045; pointer-events:none;
  }
  @media (max-width:600px){ .brand-watermark-bg{ width:280px; height:280px; right:-40px; bottom:-40px; } }
  .float-item{
    position:absolute; pointer-events:auto; cursor:grab; user-select:none; -webkit-user-select:none;
    -webkit-touch-callout:none; touch-action:none;
    font-family:'Space Grotesk', sans-serif; font-weight:700; white-space:nowrap;
    color:rgba(255,255,255,0.055); letter-spacing:0.05em; line-height:1;
    animation: floatDrift var(--dur,26s) ease-in-out infinite alternate;
    animation-delay: var(--delay,0s);
    will-change: transform; transform-origin:center;
  }
  .float-item:active{ cursor:grabbing; }
  .float-item.dragging{ animation:none !important; transition:none !important; z-index:5; }
  @keyframes floatDrift{
    0%{ transform:translate(0,0) rotate(0deg); }
    50%{ transform:translate(var(--dx,40px), var(--dy,-30px)) rotate(var(--rot,3deg)); }
    100%{ transform:translate(calc(var(--dx,40px) * -0.6), calc(var(--dy,-30px) * 0.8)) rotate(calc(var(--rot,3deg) * -1)); }
  }
  .float-logo{
    width:66px; height:66px; border-radius:18px; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg, rgba(45,212,240,0.16), rgba(166,121,255,0.16));
    border:1px solid rgba(255,255,255,0.08); opacity:0.55;
  }
  .float-logo svg{ width:32px; height:32px; opacity:0.6; }

  .mini-light{
    position:absolute; border-radius:50%; pointer-events:none;
    animation: twinkle var(--tdur,4s) ease-in-out infinite;
  }
  @keyframes twinkle{ 0%,100%{ opacity:0.12; transform:scale(0.75);} 50%{ opacity:0.95; transform:scale(1.2);} }
  @media (prefers-reduced-motion: reduce){ .float-item, .mini-light{ animation:none; } }
  @media (max-width:700px){ .float-item{ font-size:calc(var(--fsz, 32px) * 0.7) !important; } }

  #app{ position:relative; z-index:1; max-width:1180px; margin:0 auto; padding:28px 20px 90px; }

  h1,h2,h3,.display{ font-family:'Space Grotesk', sans-serif; letter-spacing:-0.01em; }
  .mono{ font-family:'JetBrains Mono', monospace; font-feature-settings:"tnum"; }

  a{ color:inherit; text-decoration:none; }

  /* ---------- Top bar ---------- */
  .topbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:34px; gap:16px; flex-wrap:wrap; position:sticky; top:0; z-index:6; transition:background .3s ease, box-shadow .3s ease, backdrop-filter .3s ease; border-radius:16px;}
  .topbar.scrolled{ background:rgba(10,13,24,0.55); backdrop-filter:blur(18px) saturate(140%); -webkit-backdrop-filter:blur(18px) saturate(140%); box-shadow:0 10px 26px rgba(0,0,0,0.32); }
  .brand{ display:flex; align-items:center; gap:12px; cursor:pointer; }
  .brand-mark{
    width:40px;height:40px; border-radius:12px; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg, var(--cyan), var(--violet));
    box-shadow:0 0 24px rgba(166,121,255,0.45);
    flex-shrink:0;
  }
  .brand-mark svg{ width:22px;height:22px; }
  .brand-text .k{ font-size:11px; letter-spacing:0.16em; color:var(--ink-faint); text-transform:uppercase; }
  .brand-text .t{ font-size:19px; font-weight:600; }
  .topbar-actions{ display:flex; gap:10px; align-items:center; }

  .btn{
    appearance:none; border:1px solid var(--glass-border); background:var(--glass); color:var(--ink);
    padding:10px 18px; border-radius:999px; font-family:'Inter',sans-serif; font-size:14px; font-weight:600;
    cursor:pointer; transition:transform .15s ease, background .2s ease, box-shadow .2s ease; backdrop-filter:blur(14px);
    display:inline-flex; align-items:center; gap:8px;
  }
  .btn:hover{ background:var(--glass-strong); transform:translateY(-1px); }
  .btn:active{ transform:translateY(0); }
  .btn-primary{ background:linear-gradient(135deg, var(--cyan), var(--violet)); border:none; color:#0a0d18; box-shadow:0 6px 24px rgba(126,120,255,0.35);}
  .btn-primary:hover{ filter:brightness(1.07); }
  .btn-danger{ background:rgba(255,107,107,0.14); border-color:rgba(255,107,107,0.4); color:#ffb3b3;}
  .btn-ghost{ background:transparent; border-color:transparent; color:var(--ink-dim); }
  .btn-ghost:hover{ background:var(--glass); color:var(--ink);}
  .btn-sm{ padding:7px 13px; font-size:12.5px; }
  .btn:disabled{ opacity:0.4; cursor:not-allowed; transform:none; }

  /* ---------- Glass card base ---------- */
  .glass{
    background:var(--glass); border:1px solid var(--glass-border); border-radius:var(--radius);
    backdrop-filter:blur(20px) saturate(140%); -webkit-backdrop-filter:blur(20px) saturate(140%);
    box-shadow:0 8px 32px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.06);
    position:relative; overflow:hidden;
  }
  /* Faint creator-logo watermark tucked into the corner of every glass card — purely
     decorative, sits behind the card's real content (backdrop-filter above gives
     .glass its own stacking context, so z-index:-1 here stays safely behind it).
     Uses ::after (not ::before) so it never collides with cards that already use
     ::before for their own effects, like .room-card's hover gradient. */
  .glass::after{
    content:''; position:absolute; right:-18px; bottom:-18px; width:130px; height:130px;
    background-image:var(--brand-mark); background-size:contain; background-repeat:no-repeat; background-position:center;
    opacity:0.05; z-index:-1; pointer-events:none;
  }

  /* ---------- Hero ---------- */
  .hero{ margin-bottom:38px; }
  .hero-eyebrow{ font-size:12px; letter-spacing:0.18em; text-transform:uppercase; color:var(--cyan); font-weight:600; margin-bottom:10px;}
  .hero h1{ font-size:clamp(28px,4.4vw,44px); font-weight:700; margin:0 0 10px; line-height:1.08;
    background:linear-gradient(120deg,#fff, #c9d3ff 45%, var(--cyan)); -webkit-background-clip:text; background-clip:text; color:transparent;}
  .hero p{ color:var(--ink-dim); font-size:15.5px; max-width:560px; line-height:1.6; margin:0; }

  /* ---------- Building tabs ---------- */
  .tabs{ display:flex; gap:8px; margin:26px 0 18px; flex-wrap:wrap; }
  .tab{ padding:9px 16px; border-radius:999px; font-size:13.5px; font-weight:600; color:var(--ink-dim); cursor:pointer; border:1px solid transparent; transition:all .2s ease;}
  .tab:hover{ color:var(--ink); }
  .tab.active{ background:var(--glass-strong); border-color:var(--glass-border); color:var(--ink); }

  /* ---------- Room grid ---------- */
  .room-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(190px,1fr)); gap:16px; }
  .room-card{
    padding:20px 18px; cursor:pointer; transition:transform .12s ease-out, box-shadow .22s ease, border-color .22s ease;
    position:relative; overflow:hidden; transform-style:preserve-3d; will-change:transform;
  }
  .room-card::before{
    content:''; position:absolute; inset:0; opacity:0; transition:opacity .3s ease;
    background:linear-gradient(135deg, rgba(45,212,240,0.12), rgba(166,121,255,0.12));
  }
  .room-card:hover{ transform:translateY(-4px); border-color:rgba(255,255,255,0.28); box-shadow:0 14px 40px rgba(0,0,0,0.4);}
  .room-card:hover::before{ opacity:1; }
  .room-card-top{ display:flex; justify-content:space-between; align-items:flex-start; position:relative; z-index:1;}
  .room-num{ font-size:12px; color:var(--ink-faint); letter-spacing:0.1em; font-weight:600; }
  .room-label{ font-size:19px; font-weight:700; margin-top:2px; font-family:'Space Grotesk',sans-serif;}
  .room-tenant{ font-size:12.5px; color:var(--ink-dim); margin-top:2px; min-height:16px;}
  .gauge-wrap{ display:flex; align-items:center; justify-content:center; margin-top:14px; position:relative; z-index:1;}
  .room-foot{ display:flex; justify-content:space-between; align-items:baseline; margin-top:12px; position:relative; z-index:1;}
  .room-foot .bill{ font-size:16px; font-weight:700; }
  .room-foot .lbl{ font-size:10.5px; text-transform:uppercase; letter-spacing:0.08em; color:var(--ink-faint); }
  .room-foot-item{ text-align:left; }
  .room-foot-item.right{ text-align:right; }

  .spike-badge-stack{
    display:flex; flex-wrap:wrap; gap:6px; margin-top:10px;
  }
  .spike-badge{
    font-size:10.5px; font-weight:700; padding:4px 9px; border-radius:999px; white-space:nowrap;
  }
  .spike-badge-avg{
    color:#3a1400; background:linear-gradient(135deg, #ffb84d, #ff6f6f);
    box-shadow:0 4px 14px rgba(255,111,111,0.35);
  }
  .spike-badge-mom{
    color:#2a0a3a; background:linear-gradient(135deg, #ff8de0, #a679ff);
    box-shadow:0 4px 14px rgba(166,121,255,0.35);
  }

  .search-box{
    display:flex; align-items:center; gap:10px; padding:12px 16px; border-radius:14px;
    border:1px solid var(--glass-border); background:rgba(255,255,255,0.045); color:var(--ink-faint);
    transition:border-color .2s ease;
  }
  .search-box:focus-within{ border-color:var(--cyan); color:var(--ink-dim); }
  .search-box input{
    flex:1; background:transparent; border:none; outline:none; color:var(--ink); font-size:14px; font-family:'Inter';
  }
  .search-box input::placeholder{ color:var(--ink-faint); }

  .spike-alert-banner{
    display:flex; align-items:center; gap:16px; padding:18px 20px; border-radius:16px; margin-bottom:22px;
  }

  }
  .spike-alert-mom{
    background:linear-gradient(120deg, rgba(166,121,255,0.16), rgba(255,141,224,0.1)); border:1px solid rgba(166,121,255,0.35);
  }

  /* ---------- Detail view ---------- */
  .detail-header{ padding:26px 24px; margin-bottom:22px; display:flex; justify-content:space-between; gap:20px; flex-wrap:wrap; align-items:center;}
  .detail-title{ display:flex; align-items:center; gap:16px; }
  .detail-icon{ width:56px;height:56px;border-radius:16px; display:flex; align-items:center; justify-content:center; font-family:'Space Grotesk'; font-weight:700; font-size:20px;
    background:linear-gradient(135deg, var(--violet), var(--pink)); color:#0a0d18; flex-shrink:0;}
  .detail-title h2{ margin:0; font-size:24px; }
  .detail-title .sub{ color:var(--ink-dim); font-size:13.5px; margin-top:3px;}
  .stat-row{ display:flex; gap:26px; flex-wrap:wrap; }
  .stat{ text-align:right; }
  .stat .v{ font-size:20px; font-weight:700; font-family:'JetBrains Mono'; }
  .stat .l{ font-size:10.5px; color:var(--ink-faint); text-transform:uppercase; letter-spacing:0.08em; margin-top:2px;}

  .history-list{ display:flex; flex-direction:column; gap:12px; }
  .history-card{ padding:18px 22px; display:grid; grid-template-columns:110px 1fr auto; gap:18px; align-items:center; transition:transform .12s ease-out, border-color .18s ease; will-change:transform; }
  .history-card:hover{ transform:translateX(3px); border-color:rgba(255,255,255,0.24); }
  .hc-month{ font-family:'Space Grotesk'; font-weight:600; font-size:15px; }
  .hc-year-tag{ font-size:10.5px; color:var(--ink-faint); }
  .hc-readings{ display:flex; gap:22px; flex-wrap:wrap; }
  .hc-read-item .l{ font-size:10px; text-transform:uppercase; color:var(--ink-faint); letter-spacing:0.06em;}
  .hc-read-item .v{ font-family:'JetBrains Mono'; font-size:14px; margin-top:2px;}
  .hc-right{ text-align:right; display:flex; align-items:center; gap:14px; }
  .hc-unit{ font-family:'JetBrains Mono'; font-size:13px; color:var(--ink-dim); background:rgba(255,255,255,0.06); padding:4px 10px; border-radius:8px;}
  .hc-bill{ font-family:'JetBrains Mono'; font-weight:700; font-size:19px; }
  .hc-manual-badge{ font-size:9.5px; text-transform:uppercase; letter-spacing:0.06em; color:var(--amber); background:rgba(255,200,87,0.14); padding:3px 8px; border-radius:6px; font-weight:700;}

  .empty-state{ text-align:center; padding:60px 20px; color:var(--ink-dim); }
  .empty-state svg{ opacity:0.35; margin-bottom:14px; }

  /* ---------- Trend chart & detail actions ---------- */
  .detail-actions{ display:flex; justify-content:space-between; align-items:center; gap:14px; flex-wrap:wrap; margin-bottom:16px; }
  .trend-card{ padding:22px 22px 10px; margin-bottom:20px; }

  .trend-head h3{ margin:0; font-size:16px; }
  .metric-toggle{ display:flex; gap:6px; background:rgba(255,255,255,0.04); border:1px solid var(--glass-border); border-radius:999px; padding:3px; }
  .metric-toggle .tab{ padding:6px 14px; font-size:12.5px; margin:0; border-radius:999px; }

  .analysis-pie-grid{ display:grid; grid-template-columns:1fr 1fr; gap:22px; margin-bottom:22px; }
  @media (max-width:820px){ .analysis-pie-grid{ grid-template-columns:1fr; } }

  /* ---------- Admin ---------- */
  .gate{ max-width:400px; margin:80px auto; padding:40px 34px; text-align:center; }

  .field input, .field select{
    width:100%; padding:12px 14px; border-radius:12px; border:1px solid var(--glass-border); background:rgba(255,255,255,0.05);

  }
  .field input:focus, .field select:focus{ border-color:var(--cyan); }
  .field select{ font-family:'Inter'; }

  .admin-grid{ display:grid; grid-template-columns:260px 1fr; gap:20px; align-items:start; }
  @media (max-width:820px){ .admin-grid{ grid-template-columns:1fr; } }
  .admin-sidebar{ padding:16px; position:sticky; top:20px; max-height:calc(100vh - 40px); overflow:auto;}
  .admin-side-section{ margin-bottom:18px; }
  .admin-side-section h4{ font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--ink-faint); margin:0 0 10px; }
  .room-list-item{ padding:9px 12px; border-radius:10px; font-size:13.5px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; color:var(--ink-dim); transition:all .15s ease;}
  .room-list-item:hover{ background:var(--glass); color:var(--ink);}
  .room-list-item.active{ background:linear-gradient(135deg, rgba(45,212,240,0.18), rgba(166,121,255,0.18)); color:var(--ink); font-weight:600;}
  .room-list-share-btn{
    display:inline-flex; align-items:center; justify-content:center; width:24px; height:24px; border-radius:7px;
    border:1px solid var(--glass-border); background:rgba(255,255,255,0.05); color:inherit; cursor:pointer; flex-shrink:0;
    transition:background .15s ease, color .15s ease;
  }

  .admin-panel{ padding:22px; }
  .admin-panel h3{ margin:0 0 4px; font-size:19px; }
  .admin-panel .sub{ color:var(--ink-dim); font-size:13px; margin-bottom:20px;}

  .inline-form{ display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; padding:16px; border-radius:14px; background:rgba(255,255,255,0.035); border:1px solid var(--glass-border); margin-bottom:22px;}
  .inline-form .field{ margin-bottom:0; flex:1; min-width:110px; }

  .admin-history-row{ display:grid; grid-template-columns:100px repeat(4, 1fr) auto; gap:10px; align-items:center; padding:10px 12px; border-radius:12px; transition:background .15s ease;}
  .admin-history-row:hover{ background:rgba(255,255,255,0.035); }
  .admin-history-row input{ width:100%; padding:8px 10px; border-radius:8px; border:1px solid var(--glass-border); background:rgba(255,255,255,0.04); color:var(--ink); font-family:'JetBrains Mono'; font-size:13px;}
  .admin-history-head{ display:grid; grid-template-columns:100px repeat(4, 1fr) auto; gap:10px; padding:0 12px 8px; font-size:10.5px; text-transform:uppercase; letter-spacing:0.06em; color:var(--ink-faint);}

  .toast{
    position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(20px); opacity:0; pointer-events:none;
    background:var(--glass-strong); border:1px solid var(--glass-border); backdrop-filter:blur(20px);
    padding:12px 22px; border-radius:999px; font-size:13.5px; font-weight:600; z-index:50; transition:all .3s cubic-bezier(.2,.9,.3,1.3);
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto; }
  .toast.success{ border-color:rgba(78,230,168,0.5); }
  .toast.error{ border-color:rgba(255,107,107,0.5); }
  .toast.warning{ border-color:rgba(255,200,87,0.55); color:#ffe0a3; }

  /* Stylish glass confirm prompt — replaces native confirm() dialogs, appears in the
     same bottom-center spot as regular toasts but wider, with its own actions. */
  .confirm-toast{
    position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(24px) scale(0.96); opacity:0; pointer-events:none;
    background:var(--glass-strong); border:1px solid rgba(255,107,107,0.4); backdrop-filter:blur(24px) saturate(160%); -webkit-backdrop-filter:blur(24px) saturate(160%);
    padding:18px 20px; border-radius:20px; z-index:60; transition:all .35s cubic-bezier(.2,.9,.25,1.35);
    box-shadow:0 20px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
    width:min(380px, calc(100vw - 40px)); display:flex; gap:14px; align-items:flex-start;
  }
  .confirm-toast.show{ opacity:1; transform:translateX(-50%) translateY(0) scale(1); pointer-events:auto; }
  .confirm-toast-icon{
    width:36px; height:36px; border-radius:12px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:17px;
    background:linear-gradient(135deg, rgba(255,111,111,0.25), rgba(255,184,77,0.2)); border:1px solid rgba(255,150,90,0.35);
  }
  .confirm-toast-body{ flex:1; min-width:0; }
  .confirm-toast-title{ font-size:14px; font-weight:700; margin-bottom:3px; }
  .confirm-toast-msg{ font-size:12.5px; color:var(--ink-dim); line-height:1.5; }
  .confirm-toast-actions{ display:flex; gap:8px; margin-top:12px; justify-content:flex-end; }

  .sync-badge{ font-size:11.5px; color:var(--green); font-weight:600; display:inline-flex; align-items:center; gap:4px; padding:6px 10px; border-radius:999px; background:rgba(78,230,168,0.1); }
  .sync-badge.pending{ color:var(--amber); background:rgba(255,200,87,0.12); animation:pulse-badge 1.6s ease-in-out infinite; }
  @keyframes pulse-badge{ 0%,100%{ opacity:1; } 50%{ opacity:0.55; } }

  .footer-note{ text-align:center; color:var(--ink-faint); font-size:12px; margin-top:50px; }

  .rate-badge{ display:inline-flex; align-items:center; gap:6px; font-size:12.5px; color:var(--ink-dim); background:rgba(255,255,255,0.05); padding:6px 12px; border-radius:999px; border:1px solid var(--glass-border);}

  .month-summary{
    margin-top:26px; padding:26px 30px; display:flex; align-items:center; justify-content:space-around; flex-wrap:wrap; gap:20px;
    background:linear-gradient(120deg, rgba(45,212,240,0.09), rgba(166,121,255,0.09), rgba(255,111,165,0.09));
  }
  .summary-item{ text-align:center; }
  .summary-item .v{ font-family:'Space Grotesk', sans-serif; font-size:28px; font-weight:700;
    background:linear-gradient(120deg, #fff, var(--cyan)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .summary-item .l{ font-size:11.5px; color:var(--ink-dim); margin-top:4px; text-transform:uppercase; letter-spacing:0.05em;}
  .summary-divider{ width:1px; height:44px; background:var(--glass-border); }
  @media (max-width:640px){ .summary-divider{ display:none; } .month-summary{ padding:22px 20px; } }

  .loading-spin{ width:26px;height:26px;border-radius:50%; border:3px solid rgba(255,255,255,0.15); border-top-color:var(--cyan); animation:spin 0.8s linear infinite; margin:40px auto;}
  @keyframes spin{ to{ transform:rotate(360deg); } }

  ::-webkit-scrollbar{ width:8px; height:8px; }
  ::-webkit-scrollbar-thumb{ background:rgba(255,255,255,0.15); border-radius:8px; }

  /* ---------- entrance animation ---------- */
  @keyframes riseIn{ from{ opacity:0; transform:translateY(14px); } to{ opacity:1; transform:translateY(0); } }
  .room-card, .history-card{ animation:riseIn .5s cubic-bezier(.2,.7,.3,1) both; }
  @media (prefers-reduced-motion: reduce){ .room-card, .history-card{ animation:none; } }

  /* ---------- Scroll-reveal (structural panels) ---------- */
  .reveal{ opacity:0; margin-top:22px; transition: opacity .7s ease, margin-top .7s cubic-bezier(.2,.7,.3,1); }
  .reveal.in-view{ opacity:1; margin-top:0; }
  @media (prefers-reduced-motion: reduce){ .reveal{ opacity:1 !important; margin-top:0 !important; transition:none !important; } }

  /* mobile-friendly labels inside admin history rows (hidden on desktop) */
  .cell-label{ display:none; }
  .cell-static{
    padding:8px 10px; border-radius:8px; background:rgba(255,255,255,0.03); border:1px solid transparent;
    font-family:'JetBrains Mono'; font-size:13px; color:var(--ink);
  }
  .cell-action{ display:flex; justify-content:flex-end; }

  /* =========================================================
     RESPONSIVE — tablet
     ========================================================= */
  @media (max-width:820px){
    .admin-grid{ grid-template-columns:1fr; }
    .admin-sidebar{ position:static; max-height:none; }
  }

  /* =========================================================
     RESPONSIVE — phones (general)
     ========================================================= */
  @media (max-width:700px){
    #app{ padding:20px 14px 70px; padding-left:max(14px, env(safe-area-inset-left)); padding-right:max(14px, env(safe-area-inset-right)); }
    .topbar{ margin-bottom:24px; }
    .topbar-actions{ flex-wrap:wrap; justify-content:flex-end; row-gap:8px; }
    .brand-text .t{ font-size:17px; }
    .sync-badge{ font-size:10.5px; padding:5px 9px; order:10; }
    .btn{ padding:9px 15px; font-size:13.5px; }

    .hero{ margin-bottom:26px; }
    .hero p{ font-size:14px; }

    .tabs{ width:100%; overflow-x:auto; flex-wrap:nowrap; -webkit-overflow-scrolling:touch; padding-bottom:4px; }
    .tabs::-webkit-scrollbar{ height:0; }
    .tab{ flex-shrink:0; }
    .rate-badge{ font-size:11.5px; padding:6px 10px; }

    .room-grid{ grid-template-columns:repeat(2, 1fr); gap:11px; }
    .room-card{ padding:15px 13px; }
    .room-label{ font-size:16px; }
    .room-tenant{ font-size:11px; }
    .gauge-wrap svg{ width:72px; height:72px; }
    .room-foot .bill{ font-size:14px; }

    .month-summary{ flex-direction:column; gap:16px; padding:22px 18px; }
    .summary-divider{ display:none; }
    .summary-item .v{ font-size:24px; }

    .detail-header{ flex-direction:column; align-items:flex-start; padding:20px 18px; gap:16px; }
    .detail-icon{ width:46px; height:46px; font-size:16px; }
    .detail-title h2{ font-size:20px; }
    .stat-row{ width:100%; justify-content:space-between; gap:12px; }
    .stat .v{ font-size:17px; }

    .history-card{ grid-template-columns:1fr; text-align:left; padding:16px 16px; gap:10px; }
    .hc-right{ justify-content:space-between; width:100%; }
    .hc-readings{ gap:16px; }

    .gate{ margin:40px auto; padding:30px 22px; max-width:none; }

    .inline-form{ padding:14px; gap:12px; }
    .inline-form .field{ min-width:100%; }
    .inline-form button{ width:100%; justify-content:center; margin-top:4px; }

    /* Admin history table -> stacked cards */
    .admin-history-head{ display:none; }
    .admin-history-row{
      grid-template-columns:1fr 1fr; row-gap:12px; column-gap:10px;
      padding:14px; border:1px solid var(--glass-border); border-radius:14px; margin-bottom:10px; background:rgba(255,255,255,0.03);
    }
    .cell-label{ display:block; font-size:9.5px; text-transform:uppercase; letter-spacing:0.06em; color:var(--ink-faint); margin-bottom:4px; }
    .cell{ display:flex; flex-direction:column; }
    .cell-action{ grid-column:1 / -1; }
    .cell-action button{ width:100%; justify-content:center; }
    .admin-history-row input, .cell-static{ width:100%; }
  }

  /* =========================================================
     RESPONSIVE — small phones
     ========================================================= */
  @media (max-width:380px){
    .room-grid{ grid-template-columns:1fr 1fr; gap:9px; }
    .hero h1{ font-size:26px; }
    .brand-text .k{ display:none; }
  }

  /* comfortable tap targets on touch devices */
  @media (hover:none){
    .btn{ padding:11px 18px; }
    .room-card:active{ transform:scale(0.98); }
    .tab{ padding:10px 16px; }
  }
</style>

/* ============ DATABASE (Firebase Realtime Database) with offline safety ============ */
let liveSyncActive = false;
const LOCAL_KEY = 'voltLedgerLocalData';
const PENDING_KEY = 'voltLedgerPendingSync';

function saveLocalCopy(data){
  try{ localStorage.setItem(LOCAL_KEY, JSON.stringify(data)); }catch(e){ /* storage unavailable, ignore */ }
}
function getLocalCopy(){
  try{ const raw = localStorage.getItem(LOCAL_KEY); return raw ? JSON.parse(raw) : null; }catch(e){ return null; }
}
function setPending(isPending){
  try{ localStorage.setItem(PENDING_KEY, isPending ? '1' : '0'); }catch(e){ /* ignore */ }
  updateSyncBadge();
}
function isPending(){
  try{ return localStorage.getItem(PENDING_KEY) === '1'; }catch(e){ return false; }
}

async function loadData(){
  // If a previous session left unsynced changes, those take priority — never let them get silently lost
  if(isPending()){
    const local = getLocalCopy();
    if(local){
      trySyncPending(); // fire-and-forget attempt to push it up right away
      return local;
    }
  }
  try{
    const snap = await DATA_REF.once('value');
    if(snap.exists()){
      const val = snap.val();
      saveLocalCopy(val);
      return val;
    }
    // first-ever run: seed the database with the CSV data
    await DATA_REF.set(SEED_DATA);
    saveLocalCopy(SEED_DATA);
    return JSON.parse(JSON.stringify(SEED_DATA));
  }catch(e){
    console.error('Firebase load error:', e);
    const local = getLocalCopy();
    if(local){
      showToast('Offline — showing your last saved data', 'warning');
      return local;
    }
    showToast('Could not connect to database — check firebaseConfig', 'error');
    return JSON.parse(JSON.stringify(SEED_DATA));
  }
}

async function saveData(){
  // 1. Always save locally first, synchronously — this is what protects against data loss offline
  saveLocalCopy(STATE.data);
  setPending(true);
  // 2. Try to push to Firebase
  try{
    await DATA_REF.set(STATE.data);
    setPending(false);
  }catch(e){
    console.error('Firebase save error:', e);
    showToast('No internet — saved on this device, will publish once you\u2019re back online', 'warning');
  }
}

async function trySyncPending(){
  if(!isPending()) return;
  if(typeof navigator !== 'undefined' && navigator.onLine === false) return;
  try{
    const local = getLocalCopy();
    if(!local) return;
    await DATA_REF.set(local);
    setPending(false);
    showToast('Back online — your changes are published ✓');
  }catch(e){
    // still offline or blocked, will retry later
  }
}

// Keep every open tab/device in sync in real time
function startLiveSync(){
  if(liveSyncActive) return;
  liveSyncActive = true;
  DATA_REF.on('value', (snap)=>{
    if(!snap.exists()) return;
    if(isPending()) return; // don't let remote data clobber unsynced local edits
    STATE.data = snap.val();
    saveLocalCopy(STATE.data);
    if(!STATE.loading) render();
  });
  window.addEventListener('online', trySyncPending);
  setInterval(trySyncPending, 15000);
}

function updateSyncBadge(){
  const el = document.getElementById('sync-badge');
  if(!el) return;
  if(isPending()){
    el.textContent = '● Offline — changes pending';
    el.className = 'sync-badge pending';
  }else{
    el.textContent = '● Synced';
    el.className = 'sync-badge';
  }
}

// Usage spike detection: flags a room whose latest recorded month is 40%+ above
// its own trailing average (up to the previous 6 filled months). Needs at least
// 2 prior filled months to form a meaningful baseline, otherwise returns null.
const SPIKE_THRESHOLD = 0.4; // 40%
function computeSpike(room){
  const filled = room.history.filter(h => h.unit !== null && h.unit !== undefined && h.unit !== '');
  if(filled.length < 3) return null;
  const current = filled[filled.length - 1];
  const baseline = filled.slice(Math.max(0, filled.length - 1 - 6), filled.length - 1);
  if(baseline.length < 2) return null;
  const avg = baseline.reduce((s,h)=> s + Number(h.unit), 0) / baseline.length;
  if(avg <= 0) return null;
  const currentUnit = Number(current.unit);
  const pct = ((currentUnit - avg) / avg) * 100;
  if(pct < SPIKE_THRESHOLD * 100) return null;
  return { pct: Math.round(pct), avg: Math.round(avg), currentUnit, month: current.month };
}
// Simpler companion check: flags a room whose latest month is 40%+ above just the
// single previous month (not the 6-month average) — catches a sudden one-month jump
// even when the trailing average is too short or too noisy to trigger computeSpike().
function computeMoMSpike(room){
  const filled = room.history.filter(h => h.unit !== null && h.unit !== undefined && h.unit !== '');
  if(filled.length < 2) return null;
  const current = filled[filled.length - 1];
  const previous = filled[filled.length - 2];
  const prevUnit = Number(previous.unit);
  if(prevUnit <= 0) return null;
  const currentUnit = Number(current.unit);
  const pct = ((currentUnit - prevUnit) / prevUnit) * 100;
  if(pct < SPIKE_THRESHOLD * 100) return null;
  return { pct: Math.round(pct), prevUnit: Math.round(prevUnit), currentUnit, month: current.month, prevMonth: previous.month };
}

let confirmToastResolver = null;
// Glass-styled, promise-based replacement for the native confirm() dialog. Renders
// as a wider toast at the bottom of the screen with its own Cancel/Delete buttons.
// Usage: const ok = await showConfirmToast('Delete this?', 'Some detail…'); if(!ok) return;
function showConfirmToast(title, message, confirmLabel='Delete'){
  return new Promise(resolve=>{
    const el = document.getElementById('confirm-toast');
    // If a previous confirm is somehow still open, cancel it before starting a new one
    if(confirmToastResolver){ confirmToastResolver(false); confirmToastResolver = null; }
    confirmToastResolver = resolve;
    el.innerHTML = `
      <div class="confirm-toast-icon">🗑️</div>
      <div class="confirm-toast-body">
        <div class="confirm-toast-title">${escapeHtml(title)}</div>
        <div class="confirm-toast-msg">${escapeHtml(message)}</div>
        <div class="confirm-toast-actions">
          <button class="btn btn-ghost btn-sm" id="confirm-toast-cancel">Cancel</button>
          <button class="btn btn-danger btn-sm" id="confirm-toast-ok">${escapeHtml(confirmLabel)}</button>
        </div>
      </div>
    `;
    el.className = 'confirm-toast show';
    const finish = (result)=>{
      el.className = 'confirm-toast';
      confirmToastResolver = null;
      resolve(result);
    };
    document.getElementById('confirm-toast-cancel').onclick = ()=> finish(false);
    document.getElementById('confirm-toast-ok').onclick = ()=> finish(true);
  });
}

/* ============ USAGE TREND CHART ============ */
function trendChartSvg(entries, metric){
  const w = 640, h = 220, padL = 46, padR = 18, padT = 18, padB = 30;
  const vals = entries.map(e => Number(metric==='unit' ? e.unit : e.bill) || 0);
  const max = Math.max(...vals, 1);
  const n = entries.length;
  const chartW = w - padL - padR;
  const chartH = h - padT - padB;
  const stepX = n > 1 ? chartW/(n-1) : 0;
  const accent = metric === 'unit' ? 'var(--cyan)' : 'var(--violet)';

  const pts = entries.map((e,i)=>{
    const v = vals[i];
    const x = padL + i*stepX;
    const y = padT + chartH - (v/max)*chartH;
    return {x, y, v, month:e.month};
  });

  const linePath = pts.length
    ? pts.map((p,i)=> (i===0?'M':'L') + p.x.toFixed(1) + ' ' + p.y.toFixed(1)).join(' ')
    : '';
  const areaPath = pts.length
    ? linePath + ` L ${pts[pts.length-1].x.toFixed(1)} ${(padT+chartH).toFixed(1)} L ${pts[0].x.toFixed(1)} ${(padT+chartH).toFixed(1)} Z`
    : '';

  const gridLines = [0,0.5,1].map(f=>{
    const y = padT + chartH - f*chartH;
    const label = fmtNum(Math.round(max*f));
    return `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${w-padR}" y2="${y.toFixed(1)}" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
      <text x="${padL-8}" y="${(y+3).toFixed(1)}" text-anchor="end" font-family="JetBrains Mono" font-size="9" fill="var(--ink-faint)">${label}</text>`;
  }).join('');

  const labelEvery = n > 14 ? Math.ceil(n/8) : (n > 8 ? 2 : 1);
  const xLabels = pts.map((p,i)=> i % labelEvery === 0
    ? `<text x="${p.x.toFixed(1)}" y="${h-8}" text-anchor="middle" font-family="Inter" font-size="9" fill="var(--ink-faint)">${monthShort(p.month)}</text>`
    : '').join('');

  const dots = pts.map(p=>
    `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3.4" fill="${accent}" stroke="var(--bg-1)" stroke-width="1.5">` +
    `<title>${escapeHtml(p.month)}: ${fmtNum(p.v)}${metric==='bill' ? ' Tk' : ' units'}</title></circle>`
  ).join('');

  const gradId = 'tg'+Math.random().toString(36).slice(2,8);

  if(!pts.length){
    return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;display:block;"></svg>`;
  }

  return `
  <svg viewBox="0 0 ${w} ${h}" style="width:100%; height:auto; display:block;">
    <defs>
      <linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${accent}" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="${accent}" stop-opacity="0"/>
      </linearGradient>
    </defs>
    ${gridLines}
    <path d="${areaPath}" fill="url(#${gradId})" stroke="none"/>
    <path d="${linePath}" fill="none" stroke="${accent}" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}
    ${xLabels}
  </svg>`;
}

/* ============ ANALYSIS: PIE / DONUT CHART ============ */
// Auto-generates visually distinct colors using the golden-angle hue rotation,
// so it looks good no matter how many rooms exist.
function sliceColor(i){
  const hue = (i * 137.508) % 360;
  return `hsl(${hue.toFixed(1)} 78% 62%)`;
}

function pieChartSvg(rawItems, opts={}){
  const items = rawItems.filter(i=>i.value>0).sort((a,b)=>b.value-a.value);
  if(!items.length){
    return `<div class="empty-state" style="padding:24px;">${ICON_EMPTY}<div>Not enough data yet.</div></div>`;
  }
  const maxSlices = opts.maxSlices || 9;
  let sliceData = items.slice(0, maxSlices);
  if(items.length > maxSlices){
    const otherValue = items.slice(maxSlices).reduce((s,i)=>s+i.value,0);
    sliceData = sliceData.concat([{ label: `Other (${items.length - maxSlices} rooms)`, value: otherValue, isOther:true }]);
  }
  const total = sliceData.reduce((s,i)=>s+i.value,0) || 1;
  const size = opts.size || 240;
  const cx = size/2, cy = size/2, r = size/2 - 6;
  const innerR = opts.donut ? r*0.58 : 0;

  let angle = -Math.PI/2;
  const slices = sliceData.map((it,i)=>{
    const frac = it.value/total;
    const sweep = frac * Math.PI * 2;
    const startAngle = angle, endAngle = angle + sweep;
    angle = endAngle;
    const x1 = cx + r*Math.cos(startAngle), y1 = cy + r*Math.sin(startAngle);
    const x2 = cx + r*Math.cos(endAngle), y2 = cy + r*Math.sin(endAngle);
    const largeArc = sweep > Math.PI ? 1 : 0;
    const color = it.isOther ? 'rgba(255,255,255,0.18)' : sliceColor(i);
    let d;
    if(innerR > 0){
      const ix1 = cx + innerR*Math.cos(endAngle), iy1 = cy + innerR*Math.sin(endAngle);
      const ix2 = cx + innerR*Math.cos(startAngle), iy2 = cy + innerR*Math.sin(startAngle);
      d = `M ${x1.toFixed(2)} ${y1.toFixed(2)} A ${r} ${r} 0 ${largeArc} 1 ${x2.toFixed(2)} ${y2.toFixed(2)} L ${ix1.toFixed(2)} ${iy1.toFixed(2)} A ${innerR} ${innerR} 0 ${largeArc} 0 ${ix2.toFixed(2)} ${iy2.toFixed(2)} Z`;
    } else {
      d = `M ${cx} ${cy} L ${x1.toFixed(2)} ${y1.toFixed(2)} A ${r} ${r} 0 ${largeArc} 1 ${x2.toFixed(2)} ${y2.toFixed(2)} Z`;
    }
    return { d, color, label: it.label, pct: (frac*100).toFixed(1), value: it.value };
  });

  const paths = slices.map(s=>
    `<path d="${s.d}" fill="${s.color}" stroke="var(--bg-1)" stroke-width="2" style="transition:transform .2s ease; transform-origin:${cx}px ${cy}px;">` +
    `<title>${escapeHtml(s.label)}: ${fmtNum(s.value)}${opts.unitLabel ? ' '+opts.unitLabel : ''} (${s.pct}%)</title></path>`
  ).join('');

  const centerText = innerR > 0
    ? `<text x="${cx}" y="${cy-4}" text-anchor="middle" font-family="Space Grotesk" font-weight="700" font-size="16" fill="var(--ink)">${fmtNum(total)}</text>
       <text x="${cx}" y="${cy+14}" text-anchor="middle" font-family="Inter" font-size="9.5" fill="var(--ink-faint)">${escapeHtml(opts.centerLabel||'total')}</text>`
    : '';

  const legend = slices.map(s=>`
    <div style="display:flex; align-items:center; gap:9px; font-size:12.5px;">
      <span style="width:10px;height:10px;border-radius:3px;background:${s.color}; flex-shrink:0;"></span>
      <span style="color:var(--ink); font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${escapeHtml(s.label)}</span>
      <span class="mono" style="color:var(--ink-faint); margin-left:auto; padding-left:10px; white-space:nowrap;">${s.pct}%</span>
    </div>`).join('');

  return `
  <div style="display:flex; gap:30px; flex-wrap:wrap; align-items:center; justify-content:center;">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="flex-shrink:0;">${paths}${centerText}</svg>
    <div style="display:flex; flex-direction:column; gap:9px; min-width:180px; max-width:260px; flex:1;">${legend}</div>
  </div>`;
}

/* ============ RENDER: ANALYSIS ============ */
function renderAnalysis(){
  const flat = allRoomsFlat();

  // Highest usage of ALL TIME — cumulative units across every recorded month
  const allTime = flat
    .map(x=>({ label: x.room.tenantName || x.room.label, sub: x.building.name, value: totalUnit(x.room) }))
    .filter(x=>x.value>0)
    .sort((a,b)=>b.value-a.value)
    .slice(0,10);

  // Highest usage THIS MONTH — each room's latest actually-filled reading
  const thisMonth = flat
    .map(x=>{
      const e = latestFilledEntry(x.room);
      return e ? { label: x.room.tenantName || x.room.label, sub: x.building.name + ' · ' + e.month, value: Number(e.unit)||0 } : null;
    })
    .filter(Boolean)
    .sort((a,b)=>b.value-a.value)
    .slice(0,10);

  // Building vs building, all-time
  const buildingCompare = STATE.data.buildings
    .map(b=>({ label: b.name, value: buildingTotals(b).unit }))
    .sort((a,b)=>b.value-a.value);

  // Full (unsliced) datasets for pie charts — every room with usage, all combined
  const allTimePie = flat
    .map(x=>({ label: x.room.tenantName || x.room.label, value: totalUnit(x.room) }))
    .filter(x=>x.value>0);
  const thisMonthPie = flat
    .map(x=>{ const e = latestFilledEntry(x.room); return e ? { label: x.room.tenantName || x.room.label, value: Number(e.unit)||0 } : null; })
    .filter(Boolean);
  const billSharePie = flat
    .map(x=>({ label: x.room.tenantName || x.room.label, value: totalBill(x.room) }))
    .filter(x=>x.value>0);

  // Overall numbers
  let grandUnits=0, grandBill=0, roomCount=0;
  flat.forEach(x=>{ grandUnits += totalUnit(x.room); grandBill += totalBill(x.room); roomCount++; });
  const avgUnitsPerRoom = roomCount ? Math.round(grandUnits/roomCount) : 0;

  // Biggest single-month spike ever recorded, across every room/month
  let spike = null;
  flat.forEach(x=>{
    x.room.history.forEach(h=>{
      if(h.unit!==null && h.unit!==undefined && (!spike || h.unit>spike.unit)){
        spike = { unit:h.unit, bill:h.bill, month:h.month, label: x.room.tenantName || x.room.label, building: x.building.name };
      }
    });
  });

  // Rooms currently flagged as spiking (40%+ above their own trailing 6-month average)
  const activeSpikes = flat
    .map(x=>{
      const s = computeSpike(x.room);
      return s ? { label: x.room.tenantName || x.room.label, building: x.building.name, ...s } : null;
    })
    .filter(Boolean)
    .sort((a,b)=>b.pct-a.pct);

  // Rooms currently flagged as spiking (40%+ above just last month, a sharper/simpler signal)
  const activeMoMSpikes = flat
    .map(x=>{
      const s = computeMoMSpike(x.room);
      return s ? { label: x.room.tenantName || x.room.label, building: x.building.name, ...s } : null;
    })
    .filter(Boolean)
    .sort((a,b)=>b.pct-a.pct);

  const suggestions = [
    'Cost-per-room vs. building average, so any outlier room stands out immediately each month.',
    'Year-over-year comparison (this July vs. last July) once 12+ months of history pile up.',
    'A projected next bill for each room, based on its last 3 months\u2019 trend.',
    '"Most improved" leaderboard — rooms whose usage dropped the most month over month.',
    'Building-vs-building cost efficiency (৳ per unit), useful if the two houses ever get different rates.',
    'A downloadable analysis PDF/CSV of the full leaderboard, not just per-room statements.',
    'A simple usage target per room with a progress bar toward it.'
  ];

  return `
  <div class="hero">
    <div class="hero-eyebrow">Insights</div>
    <h1>Who's burning<br/>the most watts?</h1>
    <p>A live look at consumption across every room and building — all-time totals, this month's leaders, and a few numbers worth keeping an eye on.</p>
  </div>

  <div class="glass reveal month-summary" style="margin-bottom:26px;">
    <div class="summary-item"><div class="v">${fmtNum(grandUnits)}</div><div class="l">Total Units, All-Time</div></div>
    <div class="summary-divider"></div>
    <div class="summary-item"><div class="v">৳${fmtNum(grandBill)}</div><div class="l">Total Billed, All-Time</div></div>
    <div class="summary-divider"></div>
    <div class="summary-item"><div class="v">${fmtNum(avgUnitsPerRoom)}</div><div class="l">Avg Units / Room</div></div>
    <div class="summary-divider"></div>
    <div class="summary-item"><div class="v">${roomCount}</div><div class="l">Rooms Tracked</div></div>
  </div>

  <div class="glass reveal trend-card" style="margin-bottom:22px;">
    <div class="trend-head"><h3>🏆 Highest Usage — All Time</h3></div>
    ${neonBarChart(allTime, {unitLabel:'units'})}
  </div>

  <div class="glass reveal trend-card" style="margin-bottom:22px;">
    <div class="trend-head"><h3>⚡ Highest Usage — This Month</h3></div>
    ${neonBarChart(thisMonth, {unitLabel:'units'})}
  </div>

  <div class="glass reveal trend-card" style="margin-bottom:22px;">
    <div class="trend-head"><h3>🏢 Building Comparison — All Time</h3></div>
    ${neonBarChart(buildingCompare, {unitLabel:'units'})}
  </div>

  <div class="analysis-pie-grid">
    <div class="glass reveal trend-card">
      <div class="trend-head"><h3>🥧 Usage Share — All Time</h3></div>
      ${pieChartSvg(allTimePie, {unitLabel:'units', centerLabel:'units total'})}
    </div>
    <div class="glass reveal trend-card">
      <div class="trend-head"><h3>🍩 Usage Share — This Month</h3></div>
      ${pieChartSvg(thisMonthPie, {donut:true, unitLabel:'units', centerLabel:'units this month'})}
    </div>
  </div>

  <div class="analysis-pie-grid">
    <div class="glass reveal trend-card">
      <div class="trend-head"><h3>💰 Bill Share — All Time (৳)</h3></div>
      ${pieChartSvg(billSharePie, {unitLabel:'৳', centerLabel:'৳ total'})}
    </div>
    <div class="glass reveal trend-card">
      <div class="trend-head"><h3>🏠 Building Split — All-Time Units</h3></div>
      ${pieChartSvg(buildingCompare, {donut:true, maxSlices:6, unitLabel:'units', centerLabel:'units total'})}
    </div>
  </div>

  ${spike ? `
  <div class="glass reveal" style="padding:22px 24px; margin-bottom:22px; display:flex; align-items:center; gap:18px; flex-wrap:wrap;">
    <div style="font-size:26px;">🔥</div>
    <div>
      <div style="font-size:12px; color:var(--ink-dim); text-transform:uppercase; letter-spacing:0.06em; font-weight:600;">Highest Single-Month Spike Ever</div>
      <div style="font-size:16px; font-weight:700; margin-top:3px;">${escapeHtml(spike.label)} <span style="color:var(--ink-dim); font-weight:500;">(${escapeHtml(spike.building)})</span> — ${fmtNum(spike.unit)} units in ${escapeHtml(spike.month)} <span class="mono" style="color:var(--amber);">৳${fmtNum(spike.bill)}</span></div>
    </div>
  </div>` : ''}

  <div class="glass reveal" style="padding:24px 26px; margin-bottom:22px;">
    <h3 style="margin:0 0 4px; font-size:17px;">⚠️ Rooms Currently Spiking</h3>
    <div style="color:var(--ink-dim); font-size:13px; margin-bottom:16px;">Rooms whose latest recorded month is 40%+ above their own trailing average.</div>
    ${activeSpikes.length ? `
    <div style="display:flex; flex-direction:column; gap:10px;">
      ${activeSpikes.map(s=>`
        <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; padding:12px 14px; border-radius:12px; background:rgba(255,111,111,0.08); border:1px solid rgba(255,150,90,0.3); flex-wrap:wrap;">
          <div>
            <div style="font-size:14.5px; font-weight:700;">${escapeHtml(s.label)} <span style="color:var(--ink-dim); font-weight:500; font-size:12.5px;">(${escapeHtml(s.building)})</span></div>
            <div style="font-size:12.5px; color:var(--ink-dim); margin-top:2px;">${fmtNum(s.currentUnit)} units in ${escapeHtml(s.month)} vs. average ${fmtNum(s.avg)} units</div>
          </div>
          <div style="font-size:15px; font-weight:800; color:var(--amber);">+${s.pct}%</div>
        </div>
      `).join('')}
    </div>` : `<div class="empty-state" style="padding:18px 0;">${ICON_EMPTY}<div>No rooms are currently spiking. All usage looks within normal range.</div></div>`}
  </div>

  <div class="glass reveal" style="padding:24px 26px; margin-bottom:22px;">
    <h3 style="margin:0 0 4px; font-size:17px;">📈 Rooms Spiking vs. Last Month</h3>
    <div style="color:var(--ink-dim); font-size:13px; margin-bottom:16px;">Rooms whose latest recorded month is 40%+ above just the single previous month.</div>
    ${activeMoMSpikes.length ? `
    <div style="display:flex; flex-direction:column; gap:10px;">
      ${activeMoMSpikes.map(s=>`
        <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; padding:12px 14px; border-radius:12px; background:rgba(166,121,255,0.1); border:1px solid rgba(166,121,255,0.3); flex-wrap:wrap;">
          <div>
            <div style="font-size:14.5px; font-weight:700;">${escapeHtml(s.label)} <span style="color:var(--ink-dim); font-weight:500; font-size:12.5px;">(${escapeHtml(s.building)})</span></div>
            <div style="font-size:12.5px; color:var(--ink-dim); margin-top:2px;">${fmtNum(s.currentUnit)} units in ${escapeHtml(s.month)} vs. ${fmtNum(s.prevUnit)} units in ${escapeHtml(s.prevMonth)}</div>
          </div>
          <div style="font-size:15px; font-weight:800; color:var(--violet);">+${s.pct}%</div>
        </div>
      `).join('')}
    </div>` : `<div class="empty-state" style="padding:18px 0;">${ICON_EMPTY}<div>No rooms jumped 40%+ over last month.</div></div>`}
  </div>

  <div class="glass reveal" style="padding:24px 26px;">
    <h3 style="margin:0 0 4px; font-size:17px;">💡 More you could add to this page</h3>
    <div style="color:var(--ink-dim); font-size:13px; margin-bottom:16px;">A few ideas for the next iteration of Analysis:</div>
    <div style="display:flex; flex-direction:column; gap:10px;">
      ${suggestions.map((s,i)=>`
        <div style="display:flex; gap:12px; align-items:flex-start; padding:12px 14px; border-radius:12px; background:rgba(255,255,255,0.035); border:1px solid var(--glass-border);">
          <div style="width:22px;height:22px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:linear-gradient(135deg, ${NEON_BARS[i%NEON_BARS.length][0]}, ${NEON_BARS[i%NEON_BARS.length][1]}); color:#0a0d18;">${i+1}</div>
          <div style="font-size:13.5px; line-height:1.5; color:var(--ink);">${escapeHtml(s)}</div>
        </div>
      `).join('')}
    </div>
  </div>
  `;
}

/* ============ RENDER: ROOT ============ */
function render(){
  const app = document.getElementById('app');
  if(STATE.loading){
    app.innerHTML = renderTopbar() + `<div class="loading-spin"></div>`;
    return;
  }
  let body = '';
  if(STATE.view === 'home') body = renderHome();
  else if(STATE.view === 'detail') body = renderDetail();
  else if(STATE.view === 'analysis') body = renderAnalysis();
  else if(STATE.view === 'admin') body = STATE.isAdmin ? renderAdminPanel() : renderGate();
  app.innerHTML = renderTopbar() + body;
  attachHandlers();
  if(STATE.view === 'home' && STATE.searchQuery) filterRooms(STATE.searchQuery);
}

function renderTopbar(){
  return `
  <div class="topbar">
    <div class="brand" onclick="goHome()">
      <div class="brand-mark">${ICON_BOLT}</div>
      <div class="brand-text">
        <div class="k">Electricity Bill · By Shuvro Deb</div>
        <div class="t">LITON HOUSE</div>
      </div>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-ghost btn-sm theme-toggle" onclick="toggleTheme()" title="Switch theme">${getThemeIcon()}</button>
      <span id="sync-badge" class="sync-badge ${isPending()?'pending':''}">${isPending() ? '● Offline — changes pending' : '● Synced'}</span>
      ${STATE.view!=='home' ? `<button class="btn btn-ghost" onclick="goBack()">${ICON_ARROW_LEFT} Back</button>` : ''}
      ${STATE.view!=='analysis' ? `<button class="btn btn-ghost" onclick="goAnalysis()">${ICON_CHART} Analysis</button>` : ''}
      ${STATE.isAdmin
        ? `${STATE.view!=='admin' ? `<button class="btn btn-ghost btn-sm" onclick="goAdmin()">${ICON_LOCK} Admin Panel</button>` : ''}<button class="btn btn-danger btn-sm" onclick="logoutAdmin()">Log out</button>`
        : `<button class="btn" onclick="goAdmin()">${ICON_LOCK} Admin</button>`}
    </div>
  </div>`;
}

/* ============ RENDER: HOME ============ */
function renderHome(){
  if(!STATE.activeBuildingId) STATE.activeBuildingId = STATE.data.buildings[0].id;
  const building = findBuilding(STATE.activeBuildingId);
  const totals = buildingTotals(building);
  const maxUnit = Math.max(1, ...building.rooms.map(r=>{ const l=latestFilledEntry(r); return l && l.unit ? Number(l.unit):0; }));

  const tabs = STATE.data.buildings.map(b=>`
    <div class="tab ${b.id===STATE.activeBuildingId?'active':''}" onclick="switchBuilding('${b.id}')">${escapeHtml(b.name)}</div>
  `).join('');

  const cards = building.rooms.map((room, i)=>{
    const latest = latestFilledEntry(room);
    const pct = latest && latest.unit ? Number(latest.unit)/maxUnit : 0;
    const palette = [['var(--cyan)','var(--violet)'],['var(--violet)','var(--pink)'],['var(--pink)','var(--amber)'],['var(--amber)','var(--green)'],['var(--green)','var(--cyan)']][i%5];
    const spike = computeSpike(room);
    const momSpike = computeMoMSpike(room);
    const searchBlob = [room.tenantName, room.label, 'room ' + room.roomNumber, String(room.roomNumber)].filter(Boolean).join(' ').toLowerCase();
    return `
    <div class="glass room-card" data-search="${escapeHtml(searchBlob)}" onclick="openRoom('${room.id}')">
      <div class="room-card-top">
        <div>
          <div class="room-num">ROOM ${String(room.roomNumber).padStart(2,'0')}</div>
          <div class="room-label">${room.tenantName ? escapeHtml(room.tenantName) : 'Vacant'}</div>
          ${latest ? `<div class="room-tenant">Meter: ${fmtNum(latest.prev)} → ${fmtNum(latest.curr)}</div>` : `<div class="room-tenant" style="opacity:0.5;">no data</div>`}
        </div>
      </div>
      ${(spike || momSpike) ? `
      <div class="spike-badge-stack">
        ${spike ? `<div class="spike-badge spike-badge-avg" title="Used ${spike.pct}% more than its typical 6-month average">⚠️ +${spike.pct}% vs avg</div>` : ''}
        ${momSpike ? `<div class="spike-badge spike-badge-mom" title="Used ${momSpike.pct}% more than last month (${escapeHtml(momSpike.prevMonth)})">📈 +${momSpike.pct}% vs last mo.</div>` : ''}
      </div>` : ''}
      <div class="gauge-wrap">
        ${gaugeSvg(pct, palette[0], palette[1], latest ? fmtNum(latest.unit) : '—', 'units')}
      </div>
      <div class="room-foot">
        <div class="room-foot-item">
          <div class="bill mono">৳${latest ? fmtNum(latest.bill) : '—'}</div>
          <div class="lbl">${latest ? monthShort(latest.month) : 'no data'}</div>
        </div>
        <div class="room-foot-item right">
          <div class="bill mono" style="font-size:14px;color:var(--ink-dim)">৳${fmtNum(totalBill(room))}</div>
          <div class="lbl">total</div>
        </div>
      </div>
    </div>`;
  }).join('');

  let thisMonthBill = 0, thisMonthUnit = 0, roomsWithData = 0;
  building.rooms.forEach(r=>{
    const l = latestFilledEntry(r);
    if(l){ thisMonthBill += Number(l.bill)||0; thisMonthUnit += Number(l.unit)||0; roomsWithData++; }
  });

  return `
  <div class="hero">
    <div class="hero-eyebrow">Live Meter Overview</div>
    <h1>Every room's bill,<br/>one glowing ledger.</h1>
    <p>Tap a room to open its full reading history — previous &amp; current meter values, units consumed, and amount billed each month.</p>
  </div>
  <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:14px;">
    <div class="tabs">${tabs}</div>
    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
      <div class="rate-badge">⚡ Rate: <span class="mono">৳${STATE.data.rate}</span> / unit</div>
      <button class="btn btn-sm" id="export-month-btn" onclick="exportBuildingMonthlyPDF('${building.id}')">${ICON_DOWNLOAD} This Month — All Rooms</button>
      <button class="btn btn-sm" onclick="startBulkWhatsAppShare('${building.id}', 'month')">${ICON_SHARE} WhatsApp — This Month</button>
      <button class="btn btn-sm" onclick="startBulkWhatsAppShare('${building.id}', '6months')">${ICON_SHARE} WhatsApp — Last 6 Months</button>
    </div>
  </div>
  ${STATE.wpQueue ? `
  <div class="glass reveal" style="display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; padding:14px 18px; margin-top:16px; border:1px solid rgba(78,230,168,0.35); background:rgba(78,230,168,0.08);">
    <div style="font-size:13.5px;">
      <b>Sharing ${STATE.wpQueue.mode==='6months' ? 'last 6 months' : "this month's"} bills</b> for ${escapeHtml(STATE.wpQueue.buildingName)} —
      ${STATE.wpQueue.total - STATE.wpQueue.ids.length} of ${STATE.wpQueue.total} sent.
      A WhatsApp tab just opened for the current room; pick the contact and send, then come back and tap Next.
    </div>
    <div style="display:flex; gap:8px; flex-shrink:0;">
      <button class="btn btn-sm btn-primary" onclick="continueBulkWhatsAppShare()">Share Next (${STATE.wpQueue.ids.length} left)</button>
      <button class="btn btn-sm btn-ghost" onclick="cancelBulkWhatsAppShare()">Cancel</button>
    </div>
  </div>` : ''}
  <div class="search-box" style="margin-top:16px;">
    ${ICON_SEARCH}
    <input type="text" id="room-search" placeholder="Search by room or tenant name…" value="${escapeHtml(STATE.searchQuery||'')}" oninput="filterRooms(this.value)"/>
  </div>
  <div class="room-grid" style="margin-top:14px; margin-bottom:30px;">${cards}</div>
  <div id="search-empty" class="empty-state" style="display:none; margin-top:-14px; margin-bottom:30px;">${ICON_EMPTY}<div>No rooms match your search.</div></div>
  <div class="glass reveal month-summary">
    <div class="summary-item">
      <div class="v">৳${fmtNum(thisMonthBill)}</div>
      <div class="l">Latest Month's Total (${roomsWithData} room${roomsWithData!==1?'s':''})</div>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-item">
      <div class="v">${fmtNum(thisMonthUnit)}</div>
      <div class="l">Units Consumed (latest month)</div>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-item">
      <div class="v">৳${fmtNum(totals.bill)}</div>
      <div class="l">All-Time Total, ${escapeHtml(building.name)}</div>
    </div>
  </div>
  <div class="footer-note">LITON HOUSE Electricity Bill — By Shuvro Deb — data updates automatically when the admin records a new reading.</div>
  `;
}

/* ============ RENDER: DETAIL ============ */
function renderDetail(){
  const found = findRoom(STATE.activeRoomId);
  if(!found) { STATE.view='home'; return renderHome(); }
  const {room} = found;
  const history = [...room.history].reverse();
  const rows = history.length ? history.map(h=>`
    <div class="glass history-card">
      <div>
        <div class="hc-month">${escapeHtml(h.month)}</div>
        ${h.manual ? '<div class="hc-year-tag">adjusted</div>' : ''}
      </div>
      <div class="hc-readings">
        <div class="hc-read-item"><div class="l">Previous</div><div class="v">${fmtNum(h.prev)}</div></div>
        <div class="hc-read-item"><div class="l">Current</div><div class="v">${fmtNum(h.curr)}</div></div>
      </div>
      <div class="hc-right">
        <div class="hc-unit">${fmtNum(h.unit)} units</div>
        ${h.manual ? '<span class="hc-manual-badge">Edited</span>' : ''}
        <div class="hc-bill">৳${fmtNum(h.bill)}</div>
      </div>
    </div>
  `).join('') : `<div class="empty-state">${ICON_EMPTY}<div>No billing history recorded yet for this room.</div></div>`;

  const chartEntries = room.history.filter(h => h.unit !== null && h.unit !== undefined);
  const metric = STATE.chartMetric === 'bill' ? 'bill' : 'unit';
  const spike = computeSpike(room);
  const momSpike = computeMoMSpike(room);

  return `
  <div class="glass reveal detail-header">
    <div class="detail-title">
      <div class="detail-icon">${String(room.roomNumber).padStart(2,'0')}</div>
      <div>
        <h2>${room.tenantName ? escapeHtml(room.tenantName) : escapeHtml(room.label)}</h2>
        <div class="sub">${room.tenantName ? escapeHtml(room.label) + ' · ' : ''}${history.length} month${history.length!==1?'s':''} recorded</div>
      </div>
    </div>
    <div class="stat-row">
      <div class="stat"><div class="v">${fmtNum(totalUnit(room))}</div><div class="l">Total Units</div></div>
      <div class="stat"><div class="v">৳${fmtNum(totalBill(room))}</div><div class="l">Total Billed</div></div>
    </div>
  </div>

  ${spike ? `

/* ============ RENDER: ADMIN BULK ENTRY (all rooms, one screen) ============ */
function renderBulkEntryPanel(){
  const building = findBuilding(STATE.adminBulkBuildingId) || STATE.data.buildings[0];
  if(!STATE.adminBulkMonth) STATE.adminBulkMonth = guessNextMonthForBuilding(building);
  const month = STATE.adminBulkMonth;

  const buildingTabs = STATE.data.buildings.map(b=>`
    <div class="tab ${b.id===building.id?'active':''}" onclick="setBulkBuilding('${b.id}')">${escapeHtml(b.name)}</div>
  `).join('');

  const rows = building.rooms.map(room=>{
    const lastEntry = room.history.length ? room.history[room.history.length-1] : null;
    const autoPrev = lastEntry ? (lastEntry.curr !== null && lastEntry.curr !== undefined ? lastEntry.curr : lastEntry.prev) : null;
    const duplicateWarning = !!lastEntry && lastEntry.month === month;
    const name = room.tenantName || room.label;
    let note = '';
    if(duplicateWarning) note = `<span style="font-size:10.5px;color:var(--amber);" title="This room's most recent entry is also ${month} — saving will add a second one">⚠ last entry was also ${month}</span>`;
    else if(lastEntry) note = `<span style="font-size:10.5px;color:var(--ink-faint);">last: ${escapeHtml(lastEntry.month)}</span>`;
    else note = `<span style="font-size:10.5px;color:var(--ink-faint);">no history yet</span>`;
    return `
    <div class="admin-history-row" id="bulk-row-${room.id}" data-auto-prev="${autoPrev===null?'':autoPrev}">

      <div class="cell"><span class="cell-label">Previous</span>

          ? `<div class="cell-static">${fmtNum(autoPrev)}</div>`

      </div>
      <div class="cell"><span class="cell-label">Current</span>

      <div class="cell cell-action">${note}</div>

  }).join('');

  return `

    <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap;">
      <div>
        <h3 style="margin:0;">Add This Month — All Rooms</h3>

      </div>
      <button class="btn btn-ghost btn-sm" onclick="exitBulkEntry()">${ICON_ARROW_LEFT} Back to single room</button>
    </div>

    <div style="display:flex; gap:16px; align-items:flex-end; flex-wrap:wrap; margin:18px 0 10px;">
      <div class="tabs" style="margin:0;">${buildingTabs}</div>
      <div class="field" style="margin:0;">
        <label>Month</label>
        <select onchange="setBulkMonth(this.value)">
          ${MONTHS.map(m=>`<option value="${m}" ${m===month?'selected':''}>${m}</option>`).join('')}
        </select>
      </div>
    </div>

    <div class="admin-history-head">
      <div>Room</div><div>Previous</div><div>Current</div><div>Units</div><div>Bill (৳)</div><div></div>
    </div>
    ${rows}

    <button class="btn btn-primary" style="margin-top:16px;" onclick="saveBulkEntries('${building.id}')">Save All</button>
  </div>
  `;
}

/* ============ ACTIONS ============ */
// Builds a plain snapshot of the bits of STATE that define "which screen are we on".
// Stored in history.state so the phone/browser back button can restore it later.
function navSnapshot(){
  return {
    view: STATE.view,
    activeBuildingId: STATE.activeBuildingId,
    activeRoomId: STATE.activeRoomId,
    isAdmin: STATE.isAdmin
  };
}
// Pushes a new history entry for a real in-app navigation (opening a room, going to
// analysis/admin, etc). Call this INSTEAD of render() when the view actually changes.
function navPush(){
  try{ history.pushState(navSnapshot(), ''); }catch(e){ /* ignore */ }
  render();
}
// Filters the home view's room cards by tenant/room name without a full re-render,
// so the search input never loses focus while the user is typing.
function filterRooms(query){
  STATE.searchQuery = query;
  const q = (query||'').trim().toLowerCase();
  let visible = 0;
  document.querySelectorAll('.room-card').forEach(card=>{
    const match = !q || (card.dataset.search||'').includes(q);
    card.style.display = match ? '' : 'none';
    if(match) visible++;
  });
  const emptyEl = document.getElementById('search-empty');
  if(emptyEl) emptyEl.style.display = (q && visible===0) ? 'flex' : 'none';
}
function goHome(){ STATE.view='home'; navPush(); }
// Unlike goHome(), this steps back to whatever screen was actually open before
// (e.g. Admin → Analysis → Back returns to Admin, not all the way to Home).
function goBack(){ history.back(); }
function switchBuilding(id){ STATE.activeBuildingId = id; render(); }
function openRoom(roomId){ STATE.activeRoomId = roomId; STATE.view='detail'; navPush(); window.scrollTo({top:0, behavior:'smooth'}); }
function goAdmin(){ STATE.view='admin'; navPush(); setTimeout(()=>{ const el=document.getElementById('admin-pass-input'); if(el) el.focus(); },50); }
function goAnalysis(){ STATE.view='analysis'; navPush(); window.scrollTo({top:0, behavior:'smooth'}); }
function logoutAdmin(){ STATE.isAdmin=false; STATE.view='home'; navPush(); }

// Fires when the user taps the phone's/browser's back (or forward) button.
// Restores whatever view was active at that point in history instead of leaving the app.
window.addEventListener('popstate', function(e){
  const s = e.state;
  if(s){
    STATE.view = s.view;
    STATE.activeBuildingId = s.activeBuildingId;
    STATE.activeRoomId = s.activeRoomId;
    STATE.isAdmin = s.isAdmin;
  } else {
    // No state (e.g. user went back past our very first entry) — fall back to home.
    STATE.view = 'home';
  }
  render();
});

function tryAdminLogin(){
  const val = document.getElementById('admin-pass-input').value;
  if(val === ADMIN_PASSWORD){
    STATE.isAdmin = true;
    document.getElementById('gate-error').textContent='';
    render();
  }else{
    document.getElementById('gate-error').textContent = 'Incorrect password. Try again.';
  }
}

function autoCalcNew(){
  const prev = parseFloat(document.getElementById('new-prev').value);
  const curr = parseFloat(document.getElementById('new-curr').value);
  const unitEl = document.getElementById('new-unit');
  const billEl = document.getElementById('new-bill');
  if(!isNaN(prev) && !isNaN(curr) && curr>=prev){
    const unit = curr - prev;
    unitEl.value = unit;
    billEl.value = Math.round(unit * STATE.data.rate);
  }else{
    unitEl.value = '';
    billEl.value = '';
  }
}

async function addEntry(roomId){
  const found = findRoom(roomId);
  const month = document.getElementById('new-month-select').value;
  const prev = document.getElementById('new-prev').value;
  const curr = document.getElementById('new-curr').value;
  const unit = document.getElementById('new-unit').value;
  const bill = document.getElementById('new-bill').value;
  if(prev === ''){ showToast('Previous reading is missing — add it once manually', 'error'); return; }
  if(curr === ''){ showToast('Enter this month\u2019s current reading', 'error'); return; }
  if(Number(curr) < Number(prev)){ showToast('Current reading cannot be less than previous', 'error'); return; }
  found.room.history.push({
    month, prev: Number(prev), curr: Number(curr),
    unit: Number(unit), bill: Number(bill), manual:false
  });
  await saveData();
  showToast('Month added — units & bill calculated ✓');
  render();
  const newCurrEl = document.getElementById('new-curr');
  if(newCurrEl) newCurrEl.focus();
}

async function updateEntry(roomId, idx, field, value){
  const found = findRoom(roomId);
  const entry = found.room.history[idx];
  entry[field] = value===''? null : Number(value);
  entry.manual = true;
  // if editing prev/curr, keep unit/bill as-is (manual override authority stays with admin)
  await saveData();
  showToast('Updated ✓');
  render();
}

async function deleteEntry(roomId, idx){
  const found = findRoom(roomId);
  const entry = found.room.history[idx];
  const label = entry ? `${entry.month} — ${fmtNum(entry.unit)} units, ৳${fmtNum(entry.bill)}. This can't be undone.` : "This can't be undone.";
  const confirmed = await showConfirmToast('Delete this entry?', label, 'Delete');
  if(!confirmed) return;
  found.room.history.splice(idx,1);
  await saveData();
  showToast('Row removed');
  render();
}

async function updateTenantName(roomId, value){
  const found = findRoom(roomId);
  found.room.tenantName = value;
  await saveData();
  showToast('Tenant name saved ✓');
}

async function updateRate(value){
  const v = Number(value);
  if(!isNaN(v) && v>0){ STATE.data.rate = v; await saveData(); showToast('Rate updated ✓'); }
}

function selectAdminRoom(roomId){ STATE.adminSelectedRoomId = roomId; STATE.adminHistoryExpanded = false; STATE.adminBulkMode = false; render(); }
// Steps to the previous (-1) or next (1) room across all buildings, wrapping around at the ends.
function adminGoRoom(direction){
  const flat = allRoomsFlat();
  const idx = flat.findIndex(x=>x.room.id===STATE.adminSelectedRoomId);
  if(idx===-1) return;
  const nextIdx = (idx + direction + flat.length) % flat.length;
  STATE.adminSelectedRoomId = flat[nextIdx].room.id;
  STATE.adminHistoryExpanded = false;
  render();
}
function toggleAdminHistory(){ STATE.adminHistoryExpanded = !STATE.adminHistoryExpanded; render(); }

// ---- Bulk "Add This Month — All Rooms" screen ----
// Picks a sensible default month for the bulk entry screen: whatever comes right
// after the month most rooms in this building last recorded — i.e. what the admin
// almost certainly wants to add next — instead of always defaulting to the first
// month in the calendar (which is usually long since fully recorded).
function guessNextMonthForBuilding(building){
  const lastMonths = building.rooms
    .map(r => r.history.length ? r.history[r.history.length-1].month : null)
    .filter(Boolean);
  if(!lastMonths.length) return MONTHS[0];
  const counts = {};
  lastMonths.forEach(m => counts[m] = (counts[m]||0) + 1);
  const mostCommon = Object.keys(counts).reduce((a,b) => counts[b]>counts[a] ? b : a);
  const idx = MONTHS.indexOf(mostCommon);
  return idx === -1 ? MONTHS[0] : MONTHS[(idx+1) % MONTHS.length];
}
function startBulkEntry(buildingId){
  STATE.adminBulkMode = true;
  STATE.adminBulkBuildingId = buildingId;
  STATE.adminBulkMonth = guessNextMonthForBuilding(findBuilding(buildingId));
  render();
}
function exitBulkEntry(){ STATE.adminBulkMode = false; render(); }
function setBulkBuilding(buildingId){
  STATE.adminBulkBuildingId = buildingId;
  STATE.adminBulkMonth = guessNextMonthForBuilding(findBuilding(buildingId));
  render();
}
function setBulkMonth(month){ STATE.adminBulkMonth = month; render(); }
// Live units/bill preview for one row of the bulk entry screen — mirrors autoCalcNew()
// but scoped to a single room's row instead of the single-room add-month form.
function bulkAutoCalc(roomId){
  const row = document.getElementById('bulk-row-'+roomId);
  const currEl = document.getElementById('bulk-curr-'+roomId);
  const unitEl = document.getElementById('bulk-unit-'+roomId);
  const billEl = document.getElementById('bulk-bill-'+roomId);
  if(!row || !currEl || !unitEl || !billEl) return;
  const prevEl = document.getElementById('bulk-prev-'+roomId);
  const prevRaw = prevEl ? prevEl.value : row.dataset.autoPrev;
  const prev = (prevRaw === '' || prevRaw === undefined) ? NaN : parseFloat(prevRaw);
  const curr = parseFloat(currEl.value);
  if(isNaN(prev) || isNaN(curr) || curr < prev){
    unitEl.textContent = '—';
    billEl.textContent = '—';
    return;
  }
  const unit = curr - prev;
  unitEl.textContent = fmtNum(unit);
  billEl.textContent = '৳' + fmtNum(Math.round(unit * STATE.data.rate));
}
// Saves every filled-in row on the bulk entry screen in one batch. A room whose most
// recent entry is also this month just gets a heads-up in its row (see
// renderBulkEntryPanel) — it's never blocked, since month names legitimately repeat
// every 12 months and a real second year's entry should never be silently refused.
async function saveBulkEntries(buildingId){
  const building = findBuilding(buildingId);
  if(!building) return;
  const month = STATE.adminBulkMonth;
  let added = 0, skippedBlank = 0, skippedInvalid = 0;
  building.rooms.forEach(room=>{
    const currEl = document.getElementById('bulk-curr-'+room.id);
    if(!currEl || currEl.value === ''){ skippedBlank++; return; }
    const row = document.getElementById('bulk-row-'+room.id);
    const prevEl = document.getElementById('bulk-prev-'+room.id);
    const prevRaw = prevEl ? prevEl.value : (row ? row.dataset.autoPrev : '');
    if(prevRaw === '' || prevRaw === undefined){ skippedInvalid++; return; }
    const prev = Number(prevRaw);
    const curr = Number(currEl.value);
    if(isNaN(prev) || isNaN(curr) || curr < prev){ skippedInvalid++; return; }
    const unit = curr - prev;
    const bill = Math.round(unit * STATE.data.rate);
    room.history.push({ month, prev, curr, unit, bill, manual:false });
    added++;
  });
  if(added===0){
    showToast(skippedInvalid ? 'Enter a previous reading for rooms with no history first' : 'Enter at least one current reading first', 'error');
    return;
  }
  await saveData();
  let msg = `Added ${added} room${added!==1?'s':''} for ${month} ✓`;
  if(skippedInvalid) msg += ` · ${skippedInvalid} skipped (missing previous reading)`;
  showToast(msg);
  STATE.adminBulkMode = false;
  render();
}

function attachHandlers(){
  initScrollReveal();

  const h = hex.replace('#','');
  const r = parseInt(h.substring(0,2),16), g = parseInt(h.substring(2,4),16), b = parseInt(h.substring(4,6),16);
  return `rgba(${r},${g},${b},${a})`;
}

function shareLatestBillWhatsApp(roomId){

  const name = room.tenantName || room.label;

// Same idea as shareLatestBillWhatsApp, but summarizes up to the last 6 filled
// months for the room instead of just the latest one.
function shareRecentMonthsWhatsApp(roomId, monthsBack=6){
  const found = findRoom(roomId);
  if(!found){ showToast('Room not found', 'error'); return false; }
  const { room, building } = found;
  const filled = room.history.filter(h => h.unit !== null && h.unit !== undefined && h.unit !== '');
  if(!filled.length){ showToast('No billing data recorded yet for this room', 'error'); return false; }
  const recent = filled.slice(Math.max(0, filled.length - monthsBack));
  const name = room.tenantName || room.label;
  const totalUnits = recent.reduce((s,h)=> s + (Number(h.unit)||0), 0);
  const totalBillAmt = recent.reduce((s,h)=> s + (Number(h.bill)||0), 0);
  const lines = [
    `Electricity Bill Summary — ${building.name}, ${room.label}`,
    `Hi ${name}, here is your billing history for the last ${recent.length} month${recent.length!==1?'s':''}:`,
    ``,

    ``,
